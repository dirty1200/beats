<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats Uploader</title>
<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer@4.4.0/
dist/browser-id3-writer.js"></script>
</head>
<body style="background-color: #f0f0f0; padding: 20px;">
<div id="app" style="font-family: sans-serif; max-width: 450px;
margin: 0 auto; padding: 25px; background: #fff; border-radius: 10px;">
<h3>Ladda upp din låt</h3>
<label>Artist:</label>

<input type="text" id="artistInput" style="width:100%; margin-
bottom:15px; padding:10px;">

<label>Låttitel:</label>

<input type="text" id="titleInput" style="width:100%; margin-
bottom:15px; padding:10px;">

<label>Genre:</label>

<input type="text" id="genreInput" style="width:100%; margin-
bottom:15px; padding:10px;">

<label>Anteckningar:</label>

<textarea id="notesInput" rows="3" style="width:100%; margin-
bottom:20px; padding:10px;"></textarea>

<label>Välj MP3-fil (Max 10MB):</label>
<input type="file" id="fileInput" accept="audio/mpeg"
style="width:100%; margin-bottom:25px;">
<button id="tagButton" style="width:100%; padding:12px;
background:#222; color:#fff; cursor:pointer;">Skicka till Dropbox</button>

<div id="statusMessage" style="display:none; color:green; margin-
top:15px;"></div>

</div>
<script>
document.getElementById('tagButton').addEventListener('click', ()
=> {
const file = document.getElementById('fileInput').files[0];
const artist = document.getElementById('artistInput').value;
const title = document.getElementById('titleInput').value;
const genre = document.getElementById('genreInput').value;

const notes = document.getElementById('notesInput').value;
if (!file) return alert('Välj en fil!');
if (file.size > 10485760) return alert('Filen är för stor! Max
10MB.');
const btn = document.getElementById('tagButton');
btn.innerText = "Laddar upp...";
btn.disabled = true;
const reader = new FileReader();
reader.onload = function() {
try {
const writer = new browserID3Writer(reader.result);
if (artist) writer.setFrame('TPE1', [artist]);
if (title) writer.setFrame('TIT2', title);
writer.addTag();
const formData = new FormData();
formData.append('file', writer.getBlob(), 'tagged_' +
file.name);
formData.append('artist', artist);
formData.append('title', title);
formData.append('genre', genre);
formData.append('notes', notes);
// VIKTIGT: Vi byter ut denna i Steg 4!
const serverUrl = 'https://beats-2kd7.onrender.com/upload';
fetch(serverUrl, { method: 'POST', body: formData })
.then(async res => {
if(res.ok) {
document.getElementById('statusMessage').innerText = await res.text();
document.getElementById('statusMessage').style.display = 'block';
}
}).finally(() => {
btn.innerText = "Skicka till Dropbox";
btn.disabled = false;
});
} catch(e) { 
    alert("KRASCHRAPPORT: " + e.name + " - " + e.message); 
    btn.disabled = false; 
}
};
reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
